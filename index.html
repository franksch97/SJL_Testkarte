<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vogel-Kartierung</title>

    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    
    <style>
        /* Die Karte füllt den ganzen Bildschirm */
        body, html { margin: 0; padding: 0; height: 100%; width: 100%; }
        #map { height: 100vh; width: 100vw; }

        /* --- LEGENDE STYLE --- */
        .custom-legend {
            position: fixed;
            background: white;
            z-index: 1000;
            border: 2px solid #333;
            border-radius: 8px;
            font-family: Arial, sans-serif;
            box-shadow: 0 0 15px rgba(0,0,0,0.2);
            overflow-y: auto;
            transition: all 0.3s ease;
        }

        /* DESKTOP-ANSICHT (Große Bildschirme) */
        @media (min-width: 601px) {
            .custom-legend {
                bottom: 30px;
                right: 20px;
                width: 260px;
                max-height: 80vh;
                padding: 15px;
                font-size: 13px;
            }
            #legend-toggle { display: none; } /* Kein Button am PC */
        }

        /* MOBILE ANSICHT (Handys) */
        @media (max-width: 600px) {
            .custom-legend {
                bottom: 85px; 
                right: 15px;
                left: 15px;
                max-height: 60vh;
                padding: 12px;
                font-size: 11px;
                transform: scale(0); /* Startet unsichtbar */
                transform-origin: bottom right;
                opacity: 0;
            }
            .custom-legend.active {
                transform: scale(1); /* Erscheint beim Klick */
                opacity: 1;
            }
            #legend-toggle {
                position: fixed;
                bottom: 25px;
                right: 20px;
                z-index: 1001;
                width: 50px;
                height: 50px;
                border-radius: 50%;
                background: #2c3e50;
                color: white;
                border: none;
                font-size: 24px;
                cursor: pointer;
                display: flex;
                align-items: center;
                justify-content: center;
                box-shadow: 0 4px 10px rgba(0,0,0,0.3);
            }
        }

        /* Styling der Legenden-Inhalte */
        .legend-item { display: flex; align-items: center; margin-bottom: 6px; }
        .legend-symbol { width: 18px; height: 18px; margin-right: 10px; flex-shrink: 0; }
        .color-box { border: 1px solid #000; }
        .status-icon { object-fit: contain; }
    </style>
</head>
<body>

    <div id="map"></div>

    <button id="legend-toggle" onclick="toggleMobileLegend()">i</button>

    <div id="legend" class="custom-legend">
        <div style="margin-bottom: 8px; border-bottom: 1px solid #ccc; padding-bottom: 5px;">
            <b>Vogelarten</b>
        </div>
        
        <div class="legend-item
